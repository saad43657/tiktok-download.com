<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TK-DROP — High Quality TikTok Downloader</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Outfit:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2dd4bf;
            --secondary: #a855f7;
            --bg: #0f172a;
            --card: #1e293b;
            --input: #334155;
            --text: #f8fafc;
            --text-dim: #94a3b8;
            --error: #ef4444;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Plus Jakarta Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            background-image:
                radial-gradient(at 0% 0%, hsla(253,16%,7%,1) 0, transparent 50%),
                radial-gradient(at 100% 0%, hsla(225,39%,30%,1) 0, transparent 50%);
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes glow { 0%, 100% { box-shadow: 0 0 20px rgba(45, 212, 191, 0.2); } 50% { box-shadow: 0 0 40px rgba(45, 212, 191, 0.4); } }

        .container {
            width: 100%;
            max-width: 800px;
            padding: 60px 20px;
            text-align: center;
            animation: fadeIn 0.8s ease-out;
        }

        header h1 {
            font-family: 'Outfit', sans-serif;
            font-size: clamp(40px, 8vw, 72px);
            font-weight: 900;
            line-height: 1;
            margin-bottom: 10px;
            background: linear-gradient(to right, #2dd4bf, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        header p { color: var(--text-dim); font-size: 18px; margin-bottom: 40px; }

        .main-card {
            background: var(--card);
            padding: 10px;
            border-radius: 30px;
            display: flex;
            gap: 10px;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            margin-bottom: 30px;
            transition: all 0.3s;
        }

        .main-card:focus-within { border-color: var(--primary); animation: glow 3s infinite; }

        input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: white;
            padding: 0 25px;
            font-size: 16px;
            font-family: inherit;
        }

        .btn {
            border: none;
            border-radius: 22px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-paste { background: rgba(255,255,255,0.05); color: white; padding: 12px 24px; font-size: 14px; }
        .btn-dl { background: var(--primary); color: #000; padding: 12px 32px; font-size: 16px; }
        .btn-dl:hover { transform: scale(1.02); background: #5eead4; }
        .btn-dl:disabled { opacity: 0.5; cursor: not-allowed; }

        #result {
            display: none;
            background: var(--card);
            border-radius: 24px;
            padding: 30px;
            text-align: left;
            border: 1px solid rgba(255,255,255,0.05);
            animation: fadeIn 0.5s ease-out;
        }

        .result-grid { display: grid; grid-template-columns: 200px 1fr; gap: 30px; }
        .thumb { width: 100%; border-radius: 16px; aspect-ratio: 9/16; object-fit: cover; }
        .info h2 { font-size: 20px; margin-bottom: 5px; }
        .info p { color: var(--text-dim); font-size: 14px; margin-bottom: 20px; }

        .dl-options { display: flex; flex-direction: column; gap: 12px; }

        .option-btn {
            background: rgba(255,255,255,0.05);
            color: white;
            padding: 16px 20px;
            border-radius: 14px;
            text-decoration: none;
            font-weight: 600;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid transparent;
            transition: all 0.2s;
        }

        .option-btn:hover { background: var(--primary); color: #000; transform: translateX(5px); }
        .option-btn.mp3:hover { background: var(--secondary); color: white; }

        .progress-box { display: none; margin-top: 20px; }
        .bar-bg { height: 8px; background: rgba(255,255,255,0.1); border-radius: 4px; overflow: hidden; margin-bottom: 8px; }
        .bar-fill { height: 100%; background: var(--primary); width: 0%; transition: width 0.3s; }
        .status-text { font-size: 13px; color: var(--text-dim); }

        #loader {
            display: none;
            margin: 40px auto;
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255,255,255,0.1);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        @media (max-width: 600px) {
            .main-card { flex-direction: column; border-radius: 20px; padding: 15px; }
            .result-grid { grid-template-columns: 1fr; }
            .thumb { max-width: 150px; margin: 0 auto; }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>TK-DROP</h1>
            <p>Download TikTok videos in high quality MP4 format</p>
        </header>

        <div class="main-card">
            <input type="text" id="urlInput" placeholder="Paste TikTok link here..." autocomplete="off">
            <button class="btn btn-paste" onclick="pasteLink()">PASTE</button>
            <button class="btn btn-dl" id="downloadBtn" onclick="analyzeVideo()">DOWNLOAD</button>
        </div>

        <div id="loader"></div>

        <div id="result">
            <div class="result-grid">
                <img src="" id="resThumb" class="thumb">
                <div class="info">
                    <h2 id="resTitle">TikTok Video</h2>
                    <p id="resAuthor">@creator</p>

                    <div class="dl-options">
                        <a href="javascript:void(0)" onclick="startDownload('video')" class="option-btn">
                            <span>High Quality Video</span>
                            <span style="opacity: 0.5;">MP4</span>
                        </a>
                        <a href="javascript:void(0)" onclick="startDownload('mp3')" class="option-btn mp3">
                            <span>Download MP3</span>
                            <span style="opacity: 0.5;">Audio Only</span>
                        </a>
                    </div>

                    <div class="progress-box" id="progressBox">
                        <div class="bar-bg"><div class="bar-fill" id="barFill"></div></div>
                        <div class="status-text" id="statusText">Downloading... 0%</div>
                    </div>

                    <a id="finalSave" href="#" download class="btn btn-dl" style="display:none; margin-top:20px; width:100%;">
                        SAVE FILE TO DEVICE
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentVideoUrl = "";
        let currentVideoTitle = "";

        async function pasteLink() {
            try {
                const text = await navigator.clipboard.readText();
                document.getElementById('urlInput').value = text;
            } catch (err) {}
        }

        async function analyzeVideo() {
            const url = document.getElementById('urlInput').value.trim();
            if (!url) return;

            const btn = document.getElementById('downloadBtn');
            const loader = document.getElementById('loader');
            const result = document.getElementById('result');

            btn.disabled = true;
            loader.style.display = 'block';
            result.style.display = 'none';

            try {
                const response = await fetch(`/api/info?url=${encodeURIComponent(url)}`);
                const data = await response.json();
                if (data.error) throw new Error(data.error);

                currentVideoUrl = url;
                currentVideoTitle = data.title;
                document.getElementById('resThumb').src = data.thumbnail;
                document.getElementById('resTitle').textContent = data.title;
                document.getElementById('resAuthor').textContent = '@' + data.author;

                loader.style.display = 'none';
                result.style.display = 'block';
            } catch (err) {
                loader.style.display = 'none';
                alert(err.message);
            } finally {
                btn.disabled = false;
            }
        }

        function startDownload(type) {
            const progressBox = document.getElementById('progressBox');
            const barFill = document.getElementById('barFill');
            const statusText = document.getElementById('statusText');
            const finalSave = document.getElementById('finalSave');

            progressBox.style.display = 'block';
            finalSave.style.display = 'none';
            barFill.style.width = '0%';
            statusText.textContent = "Connecting...";

            const params = new URLSearchParams({
                url: currentVideoUrl,
                type: type,
                title: currentVideoTitle
            });

            const evtSrc = new EventSource(`/api/download?${params.toString()}`);

            evtSrc.onmessage = (e) => {
                const data = JSON.parse(e.data);
                if (data.type === 'progress') {
                    const p = Math.round(data.percent);
                    barFill.style.width = p + '%';
                    statusText.textContent = `Processing... ${p}%`;
                }
                else if (data.type === 'done') {
                    evtSrc.close();
                    barFill.style.width = '100%';
                    statusText.textContent = "Success! Click below to save.";
                    finalSave.href = data.downloadUrl;
                    finalSave.style.display = 'flex';
                }
                else if (data.type === 'error') {
                    evtSrc.close();
                    alert(data.message);
                }
            };
        }
    </script>
</body>
</html>
